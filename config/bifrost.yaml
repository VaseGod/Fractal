# ============================================================
# Fractal — Bifrost API Gateway Configuration
# Secure middleware for routing, mTLS, and rate limiting
# ============================================================

server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s

# ── TLS / mTLS Configuration ──
tls:
  enabled: true
  cert_file: "${BIFROST_MTLS_CERT:-/certs/server.crt}"
  key_file: "${BIFROST_MTLS_KEY:-/certs/server.key}"
  client_auth: "require_and_verify"
  client_ca_file: "/certs/ca.crt"
  min_version: "1.3"

# ── Rate Limiting ──
rate_limiting:
  enabled: true
  strategy: "sliding_window"
  rules:
    - path: "/api/*"
      max_requests: 100
      window: "1m"
    - path: "/api/agent/execute"
      max_requests: 10
      window: "1m"
    - path: "/api/memory/*"
      max_requests: 50
      window: "1m"

# ── Request Validation ──
validation:
  max_body_size: "10MB"
  require_content_type: true
  allowed_content_types:
    - "application/json"
    - "application/x-ndjson"
  block_patterns:
    - "(?i)<script[^>]*>"
    - "(?i)javascript:"
    - "(?i)on\\w+\\s*="

# ── Route Definitions ──
routes:
  # Inference API (proxied to vLLM)
  - path: "/v1/completions"
    upstream: "http://inference:8000"
    methods: ["POST"]
    auth_required: true
    rate_limit_group: "api"

  - path: "/v1/chat/completions"
    upstream: "http://inference:8000"
    methods: ["POST"]
    auth_required: true
    rate_limit_group: "api"

  # Agent Execution
  - path: "/api/agent/execute"
    upstream: "http://localhost:8081"
    methods: ["POST"]
    auth_required: true
    rate_limit_group: "agent"
    middleware:
      - "hitl_check"
      - "request_log"

  # Memory Operations
  - path: "/api/memory/*"
    upstream: "http://localhost:8081"
    methods: ["GET", "POST", "DELETE"]
    auth_required: true
    rate_limit_group: "memory"

  # Health Check (no auth)
  - path: "/health"
    upstream: "http://localhost:8081"
    methods: ["GET"]
    auth_required: false

# ── Middleware Pipeline ──
middleware:
  hitl_check:
    type: "webhook"
    description: "Human-in-the-loop approval gate"
    config:
      endpoint: "http://localhost:8081/internal/hitl/check"
      timeout: 30s
      on_failure: "reject"

  request_log:
    type: "logger"
    description: "Structured request/response logging"
    config:
      log_body: false
      log_headers: true
      output: "/app/logs/bifrost-access.log"

# ── Security Headers ──
headers:
  response:
    X-Content-Type-Options: "nosniff"
    X-Frame-Options: "DENY"
    X-XSS-Protection: "1; mode=block"
    Strict-Transport-Security: "max-age=31536000; includeSubDomains"
    Content-Security-Policy: "default-src 'none'"
    Referrer-Policy: "no-referrer"

# ── Logging ──
logging:
  level: "info"
  format: "json"
  output: "/app/logs/bifrost.log"
